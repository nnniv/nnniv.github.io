    <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    const rootStyles = getComputedStyle(document.documentElement);
    const colorLight = rootStyles.getPropertyValue('--color-light');
    const colorPurple = rootStyles.getPropertyValue('--color-purple');
    const colorNightLighter = "#242839"; // Yeah don't ask me, I be writing some bullshit
    mermaid.initialize({
      startOnLoad: true,
      theme: 'base',
      themeVariables: {
        lineColor: colorPurple,
        clusterBkg: colorNightLighter,
        clusterTextColor: colorLight,
      },
      themeCSS: `
        .cluster .nodeLabel,
        .cluster .label text,
        .cluster .label span,
        .cluster-label,
        .cluster-label .nodeLabel,
        .cluster-label text,
        .cluster-label span,
        .cluster-label p {

          color: ${colorLight} !important;
