{% extends "base.html" %} {% block content %}
<div>
  <h6 id="title">{{ section.title }}</h6>
  <ul class="pt-2 text-lg flex flex-wrap gap-x-4 justify-start">
    {% for page in section.pages %}
    <li>
      <a href="{{ page.permalink | safe }}">{{ page.title }}</a>
    </li>
    {% endfor %}
  </ul>
</div>
{% endblock content %}
