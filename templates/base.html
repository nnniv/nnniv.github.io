<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>portfolio@nived</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="icon" href="/assets/cat.svg" />
  </head>

  <body
    id="app-root"
    class="flex min-h-screen items-start justify-center blur-md transition duration-300 will-change-[filter]"
  >
    <div
      class="p-4 m-4 flex flex-col items-center w-full sm:w-5/6 md:w-2/3 lg:w-1/2"
    >
      <h3>
        <span class="text-purple">portfolio</span>
        <span class="text-orange">@</span>
        <span class="text-red">nived</span>
      </h3>
      <ul class="flex flex-nowrap overflow-x-auto space-x-4 list-none pt-4">
        <li>
          <a href="/"><span class="text-red">0:</span>home</a>
        </li>
        <li>
          <a href="{{ get_url(path='@/projects/_index.md') }}"
            ><span class="text-red">1:</span>projects</a
          >
        </li>
        <li>
          <a href="{{ get_url(path='@/blog/_index.md') }}"
            ><span class="text-red">2:</span>blogs</a
          >
        </li>
        <li>
          <a href="/resume/NIVED_S_MOHAN_RESUME.pdf"
            ><span class="text-red">3:</span>résumé</a
          >
        </li>
      </ul>
      <div class="pt-12 w-full text-center">
        {% block content %} {% endblock content %}
      </div>
    </div>
    <script src="/js/pageIndicator.js"></script>
    <script src="/js/transition.js"></script>
  </body>
  <script src="/js/pageSwitch.js"></script>
</html>
